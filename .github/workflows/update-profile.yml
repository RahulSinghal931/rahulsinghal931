name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
  push:
    branches: [main]
    paths:
      - profile.json
      - scripts/generate_profile.py
      - requirements.txt
      - bg.jpg
      - .github/workflows/update-profile.yml

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate profile card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PROFILE_LIVE_DATA: "true"
        run: python scripts/generate_profile.py

      - name: Commit changed profile
        run: |
          if git diff --quiet -- README.md assets/profile-terminal.svg; then
            echo "Profile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/profile-terminal.svg
          git commit -m "chore: refresh profile README"
          git push
