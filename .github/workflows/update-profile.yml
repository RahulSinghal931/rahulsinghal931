name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
  push:
    branches: [main]
    paths:
      - profile.json
      - scripts/generate_profile.py
      - requirements.txt
      - bg.jpg
      - .github/workflows/update-profile.yml

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and publish profile card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PROFILE_LIVE_DATA: "true"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Publish attempt ${attempt}/3"
            git fetch origin main
            git reset --hard origin/main
            python scripts/generate_profile.py

            if git diff --quiet -- README.md assets/profile-terminal.svg; then
              echo "Profile is already current."
              exit 0
            fi

            git add README.md assets/profile-terminal.svg
            git commit -m "chore: refresh profile README"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "main advanced during publication; retrying from the latest commit."
            sleep $((attempt * 2))
          done

          echo "Unable to publish after 3 attempts."
          exit 1
